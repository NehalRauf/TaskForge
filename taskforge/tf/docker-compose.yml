version: "3.9"

networks:
  taskforge: { driver: bridge }

volumes:
  postgres-data:
  redis-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: tf-postgres
    restart: unless-stopped
    networks: [taskforge]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_secret
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U taskforge -d taskforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tf-redis
    restart: unless-stopped
    networks: [taskforge]
    volumes: [redis-data:/data]
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: { context: ./api, dockerfile: Dockerfile }
    container_name: tf-api
    restart: unless-stopped
    networks: [taskforge]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_secret
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  worker-1:
    build: { context: ./worker, dockerfile: Dockerfile }
    container_name: tf-worker-1
    restart: unless-stopped
    networks: [taskforge]
    depends_on:
      api:   { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      WORKER_ID: worker-1
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_BASE_URL: http://api:8080
      WORKER_CONCURRENCY: "2"
      SERVER_PORT: "8081"

  worker-2:
    build: { context: ./worker, dockerfile: Dockerfile }
    container_name: tf-worker-2
    restart: unless-stopped
    networks: [taskforge]
    depends_on:
      api:   { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      WORKER_ID: worker-2
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_BASE_URL: http://api:8080
      WORKER_CONCURRENCY: "2"
      SERVER_PORT: "8082"

  worker-3:
    build: { context: ./worker, dockerfile: Dockerfile }
    container_name: tf-worker-3
    restart: unless-stopped
    networks: [taskforge]
    depends_on:
      api:   { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      WORKER_ID: worker-3
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_BASE_URL: http://api:8080
      WORKER_CONCURRENCY: "1"
      SERVER_PORT: "8083"

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: tf-frontend
    restart: unless-stopped
    networks: [taskforge]
    depends_on: [api]
    ports: ["3000:3000"]
